<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Novo Perfil - Fake News</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header>
        <div class="logo-container"><h1>Fake News</h1></div>
        <nav><ul><li><a href="perfis_listar.html">Voltar à Lista</a></li></ul></nav>
    </header>
    <main>
        <div class="form-container">
            <h2 class="section-title">Registrar Novo Perfil de Acesso</h2>
            <form action="perfis_listar.html" method="GET">
                <div class="form-group">
                    <label>Nome do Perfil:</label>
                    <input type="text" placeholder="Ex: Revisor" required>
                </div>
                <div class="form-group">
                    <label>Descrição das Permissões:</label>
                    <textarea rows="3" style="width: 100%; padding: 12px; border: 1px solid #f8bbd0; border-radius: 6px;" placeholder="Ex: Pode ler e aprovar antes da publicação..."></textarea>
                </div>
                <button type="submit" class="btn">Salvar Perfil</button>
            </form>
        </div>
    </main>
</body>
</html>
