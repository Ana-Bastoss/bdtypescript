<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Editar Cidade - Fake News</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header>
        <div class="logo-container"><h1>Fake News</h1></div>
        <nav><ul><li><a href="cidades_listar.html">Cancelar e Voltar</a></li></ul></nav>
    </header>
    <main>
        <div class="form-container">
            <h2 class="section-title">Atualizar Cidade</h2>
            <form action="cidades_listar.html" method="GET">
                <div class="form-group">
                    <label>ID da Cidade (Inalterável):</label>
                    <input type="text" value="1" disabled style="background-color: #eee;">
                </div>
                <div class="form-group">
                    <label>Nome da Cidade:</label>
                    <input type="text" value="Brasília" required>
                </div>
                <div class="form-group">
                    <label>Estado (UF):</label>
                    <select required>
                        <option value="1">SP - São Paulo</option>
                        <option value="2" selected>DF - Distrito Federal</option>
                    </select>
                </div>
                <button type="submit" class="btn">Atualizar Dados</button>
            </form>
        </div>
    </main>
</body>
</html>
