<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Notícia - Fake News</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header>
        <div class="logo-container"><h1>Fake News</h1></div>
        <nav><ul><li><a href="noticias_listar.html">Cancelar e Voltar</a></li></ul></nav>
    </header>
    <main>
        <div class="form-container" style="max-width: 800px;">
            <h2 class="section-title">Forçar Atualização de Notícia</h2>
            <form action="noticias_listar.html" method="GET">
                <div class="form-group">
                    <label>Título:</label>
                    <input type="text" value="Nova API de processamento paralelo é lançada" required>
                </div>
                <div class="form-group" style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label>Status:</label>
                        <select required>
                            <option value="publicado" selected>Publicado</option>
                            <option value="despublicado">Despublicado</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Corpo do Texto:</label>
                    <textarea rows="6" style="width: 100%; padding: 12px; border: 1px solid #f8bbd0; border-radius: 6px;" required>Desenvolvedores locais criam solução em Python...</textarea>
                </div>
                <button type="submit" class="btn">Atualizar Matéria</button>
            </form>
        </div>
    </main>
</body>
</html>
