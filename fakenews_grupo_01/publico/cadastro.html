<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Fake News</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="../assets/images/logo.png" alt="Logo Fake News">
            <h1>Fake News</h1>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="busca_uf.html">Por Estado</a></li>
                <li><a href="busca_tag.html">Por Tag</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2 class="section-title" style="text-align: center;">Crie sua Conta</h2>
            
            <form action="#" method="GET">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Crie uma senha forte" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn">Cadastrar</button>
                </div>

                <div class="form-footer">
                    <p>Já possui uma conta? <a href="login.html">Faça Login</a></p>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Fake News - Desenvolvido para a disciplina de Web</p>
    </footer>

</body>
</html>
