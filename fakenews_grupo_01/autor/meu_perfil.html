<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Fake News</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="../assets/images/logo.png" alt="Logo Fake News">
            <h1>Fake News</h1>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Página Inicial</a></li>
                <li><a href="minhas_noticias.html">Minhas Notícias</a></li>
                <li><a href="../index.html" style="color: #d81b60;">Sair</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-container" style="max-width: 800px;">
            <div class="profile-header">
                <img src="../assets/perfis/user1.png" alt="Foto de Perfil" class="profile-pic">
                <div>
                    <h2 style="color: #4a148c; margin-bottom: 5px;">Ana Beatriz</h2>
                    <p style="color: #666;">ana.beatriz@fakenews.com.br</p>
                    <span class="tag" style="margin-top: 10px; display: inline-block;">Nível: Autor</span>
                </div>
            </div>

            <h3 style="color: #880e4f; margin-bottom: 15px;">Atualizar Dados</h3>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" value="Ana Beatriz Gonçalves">
                </div>
                <div class="form-group">
                    <label for="bio">Minha Biografia</label>
                    <textarea id="bio" rows="4" style="width: 100%; padding: 12px; border: 1px solid #f8bbd0; border-radius: 6px;">Estudante de Ciências da Computação e entusiasta de Segurança da Informação.</textarea>
                </div>
                <button type="submit" class="btn">Salvar Alterações</button>
            </form>
        </div>
    </main>

</body>
</html>
