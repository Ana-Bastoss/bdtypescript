<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edição de Moderação - Fake News</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="../assets/images/logo.png" alt="Logo Fake News">
            <h1>Fake News</h1>
        </div>
        <nav><ul><li><a href="painel.html">Cancelar e Voltar ao Painel</a></li></ul></nav>
    </header>

    <main>
        <div class="form-container" style="max-width: 800px;">
            <div style="background-color: #fff3e0; border-left: 4px solid #ff9800; padding: 15px; margin-bottom: 20px; border-radius: 4px;">
                <p style="color: #e65100; font-weight: 600; font-size: 0.9rem;">Você está editando a matéria escrita pelo autor: Carlos Silva.</p>
            </div>

            <h2 class="section-title">Moderar Notícia</h2>
            <form action="painel.html" method="GET">
                <div class="form-group">
                    <label for="titulo">Título da Matéria</label>
                    <input type="text" id="titulo" name="titulo" value="Nova API de processamento paralelo é lançada" required>
                </div>
                
                <div class="form-group">
                    <label for="cidade">Cidade / Estado</label>
                    <select id="cidade" required>
                        <option value="1" selected>Brasília / DF</option>
                        <option value="2">São Paulo / SP</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="tags">Tags</label>
                    <input type="text" id="tags" value="tecnologia, python, desenvolvimento">
                </div>

                <div class="form-group">
                    <label for="texto">Corpo do Texto</label>
                    <textarea id="texto" rows="8" style="width: 100%; padding: 12px; border: 1px solid #f8bbd0; border-radius: 6px;" required>Desenvolvedores locais criam solução em Python utilizando threads para otimizar a leitura de dados...</textarea>
                </div>

                <button type="submit" class="btn">Salvar Alterações (Moderação)</button>
            </form>
        </div>
    </main>
</body>
</html>
